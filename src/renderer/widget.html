<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Lens Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /*
     * Widget overlay window overrides.
     * These run AFTER Tailwind base styles (injected via globals.css import
     * in widget/index.tsx) and enforce the transparent floating window
     * appearance that is specific to the overlay — without losing access
     * to CSS custom property tokens or Tailwind utility classes.
     */

    html, body {
      width: 100%;
      height: 100%;
      background: transparent !important;
      overflow: hidden;
      /* Inter is preferred for the widget; Geist is the main-app default */
      font-family: 'Inter', var(--font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
    }

    #root {
      width: 100%;
      height: 100%;
      background: transparent !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/widget/index.tsx"></script>
</body>
</html>
